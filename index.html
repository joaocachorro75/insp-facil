<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspetor EPI</title>
    <script>
      // Define global for libraries that expect it
      window.global = window;
      
      // Protect fetch from being overwritten by polyfills
      try {
        const _fetch = window.fetch;
        if (_fetch) {
          Object.defineProperty(window, 'fetch', {
            get: function() { return _fetch; },
            set: function(v) { console.warn('Library attempted to overwrite window.fetch'); },
            configurable: true
          });
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
